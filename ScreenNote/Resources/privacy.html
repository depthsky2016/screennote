  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; line-height: 1.7; color: #222; }

<body>
  <h1>截图笔记隐私政策</h1>
  <p>截图笔记默认将截图和识别结果保存在本地设备中。OCR 文字识别在设备端完成，不会上传图片。</p>
  <p>当你配置并启用 Kimi API 后，应用会将 OCR 提取出的文字内容发送至 Kimi 接口以生成标题、摘要和标签建议。应用不会上传原始截图图片。</p>
  <p>API Key 仅存储在系统 Keychain 中，不会写入应用偏好设置。你可以在设置页随时删除或替换 API Key。</p>
  <h2>联系我们</h2>
  <p>如需隐私相关支持，请通过应用发布页提供的联系渠道反馈。</p>
</body>
</html>
