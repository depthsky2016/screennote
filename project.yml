name: ScreenNote
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: ScreenNote
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 5.0
targets:
  ScreenNote:
    type: application
    supportedDestinations: [iOS]
    deploymentTarget: "17.0"
    sources:
      - path: ScreenNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiangfyi.screennote
        INFOPLIST_KEY_CFBundleDisplayName: 截图笔记
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 截图笔记需要访问相册以导入截图
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: 截图笔记需要访问相册以保存和管理截图
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
  ScreenNoteTests:
    type: bundle.unit-test
    supportedDestinations: [iOS]
    deploymentTarget: "17.0"
    sources:
      - path: ScreenNoteTests
    dependencies:
      - target: ScreenNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiangfyi.screennote.tests
        GENERATE_INFOPLIST_FILE: YES
